name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Disable UIScene migration (fixes iOS 26/27 black screen)
        run: flutter config --no-enable-uiscene-migration

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS app bundle
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            exit 1
          fi
          
          rm -rf Payload medreminder.ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q medreminder.ipa Payload/
          rm -rf Payload
          
          echo "IPA created:"
          ls -lh medreminder.ipa

      - name: Upload IPA to server via SCP
        run: |
          brew install hudochenkov/sshpass/sshpass || true
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            scp -o StrictHostKeyChecking=no \
            medreminder.ipa \
            root@${{ secrets.SERVER_HOST }}:/home/center/gateway/site/medreminder.ipa
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no \
            root@${{ secrets.SERVER_HOST }} \
            "chmod 644 /home/center/gateway/site/medreminder.ipa"
          echo "IPA uploaded to http://${{ secrets.SERVER_HOST }}/medreminder.ipa"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: medreminder-ipa
          path: medreminder.ipa
          retention-days: 7
          if-no-files-found: warn
