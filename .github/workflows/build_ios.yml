name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (no codesign)
        run: flutter build ipa --no-codesign

      - name: Find and package IPA
        run: |
          echo "=== Searching for IPA files ==="
          find . -name "*.ipa" -type f 2>/dev/null
          
          # Check if flutter build ipa produced an IPA
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
          
          if [ -n "$IPA_FILE" ]; then
            echo "Found IPA from flutter build: $IPA_FILE"
            cp "$IPA_FILE" medreminder.ipa
          else
            echo "No IPA from flutter build, building .app manually..."
            flutter build ios --no-codesign --release
            
            # Find the .app bundle
            APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              echo "Found app bundle: $APP_PATH"
              
              # Create IPA structure
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              
              # Create IPA
              zip -qr medreminder.ipa Payload/
              rm -rf Payload
              
              echo "IPA created: medreminder.ipa"
            else
              echo "ERROR: No .app bundle found!"
              exit 1
            fi
          fi
          
          ls -lh medreminder.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: medreminder-ipa
          path: medreminder.ipa
          retention-days: 7
          if-no-files-found: error
