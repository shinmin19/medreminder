name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (no codesign)
        run: flutter build ipa --no-codesign

      - name: Find and package IPA
        run: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" -type f 2>/dev/null | head -1)
          
          if [ -n "$IPA_FILE" ]; then
            cp "$IPA_FILE" medreminder.ipa
          else
            flutter build ios --no-codesign --release
            APP_PATH=$(find build/ios/iphoneos -name "*.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -qr medreminder.ipa Payload/
              rm -rf Payload
            else
              echo "ERROR: No .app bundle found!"
              exit 1
            fi
          fi
          ls -lh medreminder.ipa

      - name: Upload IPA to server via SCP
        run: |
          # Install sshpass
          brew install hudochenkov/sshpass/sshpass || true
          
          # Upload via scp
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            scp -o StrictHostKeyChecking=no \
            medreminder.ipa \
            root@${{ secrets.SERVER_HOST }}:/home/center/gateway/site/medreminder.ipa
          
          # Set permissions
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no \
            root@${{ secrets.SERVER_HOST }} \
            "chmod 644 /home/center/gateway/site/medreminder.ipa"
          
          echo "IPA uploaded to http://${{ secrets.SERVER_HOST }}/medreminder.ipa"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: medreminder-ipa
          path: medreminder.ipa
          retention-days: 7
          if-no-files-found: warn
