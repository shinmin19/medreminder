name: medreminder
description: "用药提醒APP - 吃药打卡、日历追踪、智能提醒"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 本地数据库
  sqflite: ^2.4.2
  path: ^1.9.1
  
  # 本地通知
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  
  # 日历
  table_calendar: ^3.2.0
  
  # 图表
  fl_chart: ^0.70.2
  
  # 状态管理
  provider: ^6.1.2
  
  # UUID
  uuid: ^4.5.1
  
  # 日期格式化
  intl: ^0.20.2
  
  # 路径
  path_provider: ^2.1.5
  
  # 权限管理
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
